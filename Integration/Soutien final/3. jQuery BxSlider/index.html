<html lang="en">

<body>
    <header class="header">
        <h1>Carroussel</h1>
        <p>Carroussel d'images avec le plugin jQuery Bx Slider</p>

    <main class="container main-content">
        <ul class="bxslider">
          <li>
            <figure>
              <img src="ressources/hollywood1.jpg" alt="">
              <figcaption>Légende image 1</figcaption>
            </figure>
          </li>
        
          <li>
            <figure>
              <img src="ressources/hollywood2.jpg" alt="">
              <figcaption>Légende image 2</figcaption>
            </figure>
          </li>
        
          <li>
            <figure>
              <img src="ressources/hollywood3.jpg" alt="">
              <figcaption>Légende image 3</figcaption>
            </figure>
          </li>
        
          <li>
            <figure>
              <img src="ressources/hollywood4.jpg" alt="">
              <figcaption>Légende image 4</figcaption>
            </figure>
          </li>
        </ul>
    </main>
    <footer class="footer">

    <link rel="stylesheet" href="css/jquery.bxslider.css">
    <script src="js/jquery.bxslider.min.js"></script>
    <script>
    $(document).ready(function(){
        $('.bxslider').bxSlider({
          pager: true,
          controls: false,
          auto: false,
          mode: 'horizontal',
          captions: false
        });
    });
    </script>

</body>
